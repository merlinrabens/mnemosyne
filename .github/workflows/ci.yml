name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache the fastembed ONNX model (~0.64 GB)
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-mxbai-embed-large-v1

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check mnemosyne tests

      - name: Test (real fastembed + sqlite-vec, end-to-end)
        run: pytest -q
